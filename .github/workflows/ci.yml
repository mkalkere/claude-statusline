name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan for secrets
        run: |
          PATTERNS="sk-ant-|ANTHROPIC_API_KEY|ALPACA.*KEY|ALPACA.*SECRET|AKIA[A-Z0-9]{16}|BEGIN RSA PRIVATE KEY|BEGIN OPENSSH PRIVATE KEY"
          if git diff --name-only HEAD~1 2>/dev/null | grep -Ev '\.github/(hooks|workflows)/' | xargs grep -lEi "$PATTERNS" 2>/dev/null; then
            echo "::error::Potential secrets detected in changed files!"
            exit 1
          fi
          echo "No secrets found."

  test:
    needs: secrets-scan
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true
      - name: Install package
        run: pip install .
      - name: Run tests
        run: python -m unittest discover tests/ -v
