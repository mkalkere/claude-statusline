name: Bug Report
description: Report a bug with claude-status
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly and concisely.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: doctor
    attributes:
      label: Doctor output
      description: "Paste the output of `claude-status --doctor`"
      render: shell
    validations:
      required: true
  - type: input
    id: terminal
    attributes:
      label: Terminal emulator
      description: "e.g., Windows Terminal, iTerm2, Alacritty"
    validations:
      required: false
